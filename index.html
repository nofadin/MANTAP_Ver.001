<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MANTAP</title>
    
    <!-- Manifest agar bisa di-install & Fullscreen Native -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000; 
        }
        iframe { 
            width: 100%; height: 100%; border: none; display: block;
        }
    </style>
</head>
<body>
<iframe 
  src="https://script.google.com/macros/s/AKfycbx0jgf144QGvxpxtEQpq2vLdo0xoxYr5R1oqhpTSogOTPuKKitvNBlWxO-G7zN3N2Rucw/exec" 
  allow="camera *; microphone *; display-capture *; fullscreen *" 
  sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-downloads"
  style="width:100%; height:100vh; border:none;">
</iframe>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js') // Memanggil file fisik
        .then(function(reg) {
          console.log('MANTAP: ServiceWorker Aktif!', reg.scope);
        })
        .catch(function(err) {
          console.log('MANTAP: ServiceWorker Gagal:', err);
        });
    });
  }
</script>
</body>
</html>
