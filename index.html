<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MANTAP</title>
    
    <!-- Manifest agar bisa di-install & Fullscreen Native -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000; 
        }
        iframe { 
            width: 100%; height: 100%; border: none; display: block;
        }
    </style>
</head>
<body>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbzx4xKWm9ZBJS8vWRqroWKRVNnNFRD7Wbf5rGP3EnuI9niepcfb_GnImRon5NGf9imx/exec" 
      allow="camera; microphone; display-capture; fullscreen" 
      sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"
      style="width:100%; height:100vh; border:none;">
    </iframe>

<script>
  if ('serviceWorker' in navigator) { // Perbaikan typo service_worker -> serviceWorker
    window.addEventListener('load', function() {
      const swCode = "self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });";
      const blob = new Blob([swCode], {type: 'text/javascript'});
      const swUrl = URL.createObjectURL(blob);
      
      navigator.serviceWorker.register(swUrl).then(function(reg) {
        console.log('ServiceWorker Aktif!');
      }).catch(function(err) {
        console.log('ServiceWorker Gagal:', err);
      });
    });
  }
</script>
</body>
</html>
