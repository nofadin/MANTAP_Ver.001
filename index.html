<!DOCTYPE html>
<html>
<head>
    <!-- Baris ini yang memberitahu browser bahwa ini situs mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANTAP</title>
    <style>
        /* Gabungkan semua aturan body & html jadi satu agar tidak bingung */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; /* Opsional: agar saat loading tidak putih silau */
        }
        
        /* Memaksa iframe memenuhi seluruh layar HP */
        iframe { 
            width: 100%; 
            height: 100%; /* Menggunakan 100% lebih aman daripada 100vh di beberapa browser mobile */
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- GANTI URL_WEB_APP_GAS_ANDA dengan link /exec dari Apps Script -->
    <iframe 
      src="https://script.google.com/macros/s/AKfycbzx4xKWm9ZBJS8vWRqroWKRVNnNFRD7Wbf5rGP3EnuI9niepcfb_GnImRon5NGf9imx/exec" 
      allow="camera; microphone; display-capture; fullscreen" 
      sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"
      style="width:100%; height:100vh; border:none;">
    </iframe>
<script>
  if ('service-worker' in navigator) {
    window.addEventListener('load', function() {
      // Kita gunakan Blob untuk membuat file JS secara virtual karena GAS tidak bisa hosting file .js
      const swCode = "self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });";
      const blob = new Blob([swCode], {type: 'text/javascript'});
      const swUrl = URL.createObjectURL(blob);
      
      navigator.serviceWworker.register(swUrl).then(function(registration) {
        console.log('ServiceWorker registration successful');
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>

</body>
</html>
